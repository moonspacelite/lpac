name: Build lpac v2.3.0 for OpenWrt 24.10 (ipq40xx)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build lpac ipk (arm_cortex-a7_neon-vfpv4)
    runs-on: ubuntu-24.04

    env:
      OPENWRT_VERSION: "24.10.0"
      SDK_TARGET: "ipq40xx"
      SDK_SUBTARGET: "generic"
      LPAC_VERSION: "2.3.0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libncurses-dev libssl-dev python3 rsync \
            wget unzip file zstd

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.SDK_TARGET }}-${{ env.SDK_SUBTARGET }}-v2

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${SDK_TARGET}/${SDK_SUBTARGET}"
          SDK_FILE=$(wget -qO- "${SDK_URL}/" | grep -o 'openwrt-sdk-[^"]*Linux-x86_64\.tar\.zst' | head -1)
          echo "Downloading: ${SDK_FILE}"
          wget -q "${SDK_URL}/${SDK_FILE}" -O sdk.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
          rm sdk.tar.zst

      # FIX 1: Salin paket SEBELUM feeds update, dengan nama berbeda dari feed resmi
      # Feed resmi punya 'lpac', kita override langsung di package/ bukan lewat feed
      - name: Override lpac package in SDK
        run: |
          # Hapus lpac dari feeds jika ada (akan di-install saat feeds update nanti)
          # Kita langsung copy ke package/ agar override feed
          cp -r package/lpac sdk/package/lpac

      - name: Update feeds (without installing all)
        working-directory: sdk
        run: |
          # Update feeds tapi JANGAN install -a dulu
          ./scripts/feeds update -a

          # Install hanya dependensi yang diperlukan lpac
          ./scripts/feeds install libmbim libcurl

          # Cek apakah lpac dari feed akan konflik
          # Kita TIDAK install lpac dari feed - biarkan versi di package/ yang digunakan

      - name: Configure SDK
        working-directory: sdk
        run: |
          make defconfig

          # Enable lpac dengan AT + MBIM backends
          # Perhatikan: kita menggunakan package/lpac bukan dari feed
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_lpac=y
          CONFIG_LPAC_WITH_AT=y
          CONFIG_LPAC_WITH_MBIM=y
          CONFIG_LPAC_WITH_PCSC=n
          CONFIG_LPAC_WITH_UQMI=n
          EOF

          make defconfig

      - name: Build lpac
        working-directory: sdk
        run: |
          make package/lpac/compile V=sc -j$(nproc) BUILD_LOG=1

      - name: Collect .ipk files
        run: |
          mkdir -p output
          find sdk/bin/packages -name "lpac*.ipk" -exec cp {} output/ \;
          echo "=== Output files ==="
          ls -lh output/ || echo "No .ipk found!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lpac-${{ env.LPAC_VERSION }}-ipq40xx-ipk
          path: output/*.ipk
          retention-days: 30
          if-no-files-found: error
          
