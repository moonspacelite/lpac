name: Build LPAC for OpenWrt 24.10.1 ipq40xx

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  OPENWRT_VERSION: "24.10.1"
  LPAC_VERSION: "2.3.0"
  SDK_NAME: "openwrt-sdk-24.10.1-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64"
  SDK_URL: "https://downloads.openwrt.org/releases/24.10.1/targets/ipq40xx/generic/openwrt-sdk-24.10.1-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst"

jobs:
  build:
    name: Build lpac ${{ env.LPAC_VERSION }} ipq40xx/generic
    runs-on: ubuntu-24.04

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout repo ini (opsional — hanya dibutuhkan jika Anda simpan  #
      #    custom patch atau config di repo ini)                             #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Install dependensi host yang dibutuhkan SDK OpenWrt              #
      # ------------------------------------------------------------------ #
      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            cmake \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd

      # ------------------------------------------------------------------ #
      # 3. Cache SDK agar tidak download ulang tiap run                     #
      # ------------------------------------------------------------------ #
      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk-cache/${{ env.SDK_NAME }}.tar.zst
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-ipq40xx-generic

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdk-cache
          wget -q --show-progress \
            "${{ env.SDK_URL }}" \
            -O sdk-cache/${{ env.SDK_NAME }}.tar.zst

      # ------------------------------------------------------------------ #
      # 4. Ekstrak SDK                                                       #
      # ------------------------------------------------------------------ #
      - name: Extract OpenWrt SDK
        run: |
          tar --zstd -xf sdk-cache/${{ env.SDK_NAME }}.tar.zst
          echo "SDK extracted to: ${{ env.SDK_NAME }}"

      # ------------------------------------------------------------------ #
      # 5. Update feeds & install package lpac dari feeds resmi             #
      # ------------------------------------------------------------------ #
      - name: Update & install feeds
        working-directory: ${{ env.SDK_NAME }}
        run: |
          ./scripts/feeds update -a 2>&1 | tail -20
          ./scripts/feeds install lpac 2>&1

      # ------------------------------------------------------------------ #
      # 6. (Opsional) Override versi LPAC ke v2.3.0 jika feed belum update  #
      #    Blok ini melakukan patch Makefile agar mengarah ke v2.3.0        #
      # ------------------------------------------------------------------ #
      - name: Pin LPAC version to ${{ env.LPAC_VERSION }}
        working-directory: ${{ env.SDK_NAME }}
        run: |
          MAKEFILE="feeds/packages/utils/lpac/Makefile"

          # Cek versi saat ini di feed
          CURRENT=$(grep '^PKG_VERSION:=' "$MAKEFILE" | cut -d= -f2 | tr -d ' ')
          echo "Feed LPAC version: $CURRENT"

          if [ "$CURRENT" != "${{ env.LPAC_VERSION }}" ]; then
            echo "Patching Makefile from $CURRENT → ${{ env.LPAC_VERSION }}"

            # Update versi
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ env.LPAC_VERSION }}/" "$MAKEFILE"

            # Update source hash (SHA256 dari tarball v2.3.0 di GitHub)
            # Hash ini valid untuk estkme-group/lpac v2.3.0
            # Jika hash berubah, ambil dengan:
            #   curl -sL https://codeload.github.com/estkme-group/lpac/tar.gz/refs/tags/v2.3.0 | sha256sum
            NEW_HASH="3d87080a625b10430eebb82f89e2d24e16a84a8435a9c40b3718fd88c82028ba"
            sed -i "s/^PKG_HASH:=.*/PKG_HASH:=$NEW_HASH/" "$MAKEFILE"

            echo "Patched Makefile:"
            grep -E '^PKG_(VERSION|HASH):=' "$MAKEFILE"
          else
            echo "Feed sudah pada versi ${{ env.LPAC_VERSION }}, tidak perlu patch."
          fi

      # ------------------------------------------------------------------ #
      # 7. Konfigurasi build: aktifkan backend AT + MBIM, tanpa PCSC       #
      # ------------------------------------------------------------------ #
      - name: Configure LPAC build options
        working-directory: ${{ env.SDK_NAME }}
        run: |
          # Buat .config minimal untuk paket lpac
          cat > .config <<'EOF'
          CONFIG_PACKAGE_lpac=y
          # Backend AT (AT command via /dev/ttyUSB — Fibocom L850-GL)
          CONFIG_LPAC_WITH_AT=y
          # Backend MBIM (libmbim)
          CONFIG_LPAC_WITH_MBIM=y
          # PCSC tidak ada di router — dinonaktifkan
          # CONFIG_LPAC_WITH_PCSC is not set
          EOF

          make defconfig 2>&1 | grep -E '(lpac|LPAC)' || true

      # ------------------------------------------------------------------ #
      # 8. Build paket lpac                                                  #
      # ------------------------------------------------------------------ #
      - name: Build lpac package
        working-directory: ${{ env.SDK_NAME }}
        run: |
          echo "=== Mulai build lpac v${{ env.LPAC_VERSION }} ==="
          make package/lpac/clean V=s 2>&1 | tail -5 || true
          make package/lpac/compile V=s -j$(nproc) 2>&1 | tee /tmp/build.log

          # Verifikasi output
          echo ""
          echo "=== Output .ipk ==="
          find bin/ -name 'lpac*.ipk' | sort
          find bin/ -name 'lpac*.ipk' -exec ls -lh {} \;

      # ------------------------------------------------------------------ #
      # 9. Kumpulkan artifact                                                #
      # ------------------------------------------------------------------ #
      - name: Collect build artifacts
        run: |
          mkdir -p artifact
          find ${{ env.SDK_NAME }}/bin -name 'lpac*.ipk' -exec cp {} artifact/ \;

          # Tampilkan info binary di dalam .ipk
          echo ""
          echo "=== File detail ==="
          ls -lh artifact/
          for f in artifact/*.ipk; do
            echo ""
            echo "--- $f ---"
            # Ekstrak dan periksa binary
            tmpdir=$(mktemp -d)
            ar x "$f" --output "$tmpdir" 2>/dev/null || true
            if [ -f "$tmpdir/data.tar.gz" ]; then
              tar -tzf "$tmpdir/data.tar.gz" 2>/dev/null || true
            fi
            rm -rf "$tmpdir"
          done

      # ------------------------------------------------------------------ #
      # 10. Upload artifact ke GitHub Actions                                #
      # ------------------------------------------------------------------ #
      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: lpac-${{ env.LPAC_VERSION }}-ipq40xx-generic
          path: artifact/*.ipk
          retention-days: 30

      # ------------------------------------------------------------------ #
      # 11. (Opsional) Buat Release otomatis jika dipush via tag            #
      # ------------------------------------------------------------------ #
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*.ipk
          name: "LPAC ${{ env.LPAC_VERSION }} for OpenWrt 24.10.1 ipq40xx"
          body: |
            ## LPAC ${{ env.LPAC_VERSION }} — OpenWrt 24.10.1 ipq40xx/generic

            Built for **Linksys EA6350v3** (ARM Cortex-A7 neon-vfpv4, musl eabi).

            ### Backend yang dikompilasi
            - ✅ AT (via `/dev/ttyUSBx` — cocok untuk Fibocom L850-GL)
            - ✅ MBIM (via libmbim)
            - ❌ PCSC (tidak relevan untuk router)

            ### Dependensi runtime di router
            ```
            opkg install libcurl4 libmbim
            ```

            ### Instalasi
            ```sh
            opkg install lpac_${{ env.LPAC_VERSION }}-*_arm_cortex-a7_neon-vfpv4.ipk
            ```

            ### Source
            - LPAC: https://github.com/estkme-group/lpac
            - OpenWrt SDK: 24.10.1 ipq40xx/generic
            
